<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grande Distribution | Pro</title>
  <style>
    :root {
      --apple-bg: #000000;
      --apple-nav: rgba(22, 22, 23, 0.8);
      --apple-text: #f5f5f7;
      --apple-subtext: #86868b;
      --apple-blue: #0066cc;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--apple-bg);
      color: var(--apple-text);
      -webkit-font-smoothing: antialiased;
    }

    /* BARRE DE NAV APPLE */
    nav {
      position: fixed;
      top: 0;
      width: 100%;
      height: 44px;
      background: var(--apple-nav);
      backdrop-filter: blur(20px); /* L'effet flou signature */
      -webkit-backdrop-filter: blur(20px);
      z-index: 9999;
      display: flex;
      justify-content: center;
      align-items: center;
      border-bottom: 0.5px solid rgba(255,255,255,0.1);
    }

    nav a {
      color: var(--apple-text);
      text-decoration: none;
      font-size: 12px;
      margin: 0 20px;
      opacity: 0.8;
      transition: opacity 0.3s;
    }

    nav a:hover { opacity: 1; }

    /* SECTION HERO IMMERSIVE */
    .hero-apple {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding-top: 44px;
      overflow: hidden;
    }

    .hero-apple h1 {
      font-size: clamp(40px, 8vw, 80px);
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 10px;
    }

    .hero-apple h2 {
      font-size: clamp(20px, 4vw, 32px);
      font-weight: 400;
      margin-bottom: 20px;
    }

    .links {
      display: flex;
      gap: 30px;
    }

    .links a {
      color: var(--apple-blue);
      font-size: 21px;
      text-decoration: none;
      transition: border-bottom 0.3s;
    }

    .links a:after {
      content: ' >';
      font-size: 16px;
    }

    .links a:hover {
      text-decoration: underline;
    }

    /* IMAGE PRODUIT "FLOATING" */
    .product-img {
      margin-top: 50px;
      width: 80%;
      max-width: 900px;
      transition: transform 0.5s ease;
    }

    .product-img:hover {
      transform: scale(1.02);
    }

    /* SECTION GRILLE (Style iPhone/Watch) */
    .grid-apple {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 12px;
      background: #fff; /* Pour le contraste style Apple Store */
    }

    .tile {
      height: 580px;
      background: #fbfbfd;
      color: #1d1d1f;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 50px;
      border-radius: 0;
      text-align: center;
    }

    .tile.dark {
      background: #000;
      color: #fff;
    }

    .tile h3 { font-size: 40px; margin-bottom: 5px; }
    .tile p { font-size: 21px; }

  </style>
</head>
<body>

  <nav>
    <a href="#">Leclerc Pro</a>
    <a href="#">Magasins</a>
    <a href="#">Innovation</a>
    <a href="#">Énergie</a>
    <a href="#">Soutien Météo</a>
  </nav>

  <section class="hero-apple">
    <h1>Grande Distribution.</h1>
    <h2>Plus de puissance. Plus de prix bas.</h2>
    <div class="links">
      <a href="#">En savoir plus</a>
      <a href="#">Acheter</a>
    </div>
    <img class="product-img" src="https://images.unsplash.com/photo-1610432938323-2a51d888c682?auto=format&fit=crop&w=1200" alt="Supermarché futuriste">
  </section>

  <div class="grid-apple">
    <div class="tile">
      <h3>Scan & Go</h3>
      <p>L'avenir de l'encaissement est là.</p>
    </div>
    <div class="tile dark">
      <h3>Marque Repère</h3>
      <p>Incroyablement accessible.</p>
    </div>
  </div>

</body>
</html>
